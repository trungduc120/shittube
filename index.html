<!doctype html>
<html lang="vi" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>shittube – fixed & fast</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <style>
    :root { --bg: #1c1c1e; --side: #121212; --card: #2c2c2e; --text: #ffffff; --primary: #f4b400; --border: #3a3a3c; }
    [data-theme="light"] { --bg: #f2f2f7; --side: #ffffff; --card: #ffffff; --text: #1c1c1e; --primary: #007aff; --border: #d1d1d6; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: 'Noto Sans', sans-serif; background: var(--bg); color: var(--text); display: grid; grid-template-columns: 80px 1fr 320px; height: 100vh; }
    nav { background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 30px 0; }
    .brand-vibe { font-size: 28px; font-weight: 900; color: var(--primary); margin-bottom: 40px; cursor: pointer; }
    .nav-btn { color: #8e8e93; margin-bottom: 25px; cursor: pointer; background: none; border: none; transition: 0.2s; }
    .nav-btn:hover, .nav-btn.active { color: var(--primary); }
    main { padding: 30px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
    .player-wrap { width: 100%; max-width: 900px; aspect-ratio: 16/9; background: #000; border-radius: 24px; overflow: hidden; box-shadow: 0 15px 50px rgba(0,0,0,0.6); border: 1px solid var(--border); }
    iframe { width: 100%; height: 100%; border: none; }
    .control-box { display: flex; gap: 15px; margin-top: 25px; width: 100%; max-width: 900px; }
    input { flex: 1; background: var(--card); border: 2px solid var(--border); color: var(--text); padding: 15px 25px; border-radius: 16px; outline: none; }
    .btn-go { background: var(--primary); color: #000; padding: 0 30px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; }
    aside { background: var(--side); border-left: 1px solid var(--border); padding: 25px; overflow-y: auto; }
    .plist-item { background: var(--card); padding: 10px; border-radius: 18px; margin-bottom: 12px; display: flex; gap: 12px; cursor: pointer; border: 1px solid transparent; align-items: center; }
    .plist-item img { width: 80px; height: 45px; border-radius: 8px; object-fit: cover; }
    .plist-item b { font-size: 0.8rem; flex: 1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    @media (max-width: 1024px) { body { grid-template-columns: 80px 1fr; } aside { display: none; } }
  </style>
</head>
<body>
  <nav>
    <div class="brand-vibe" onclick="location.reload()">S T</div>
    <button class="nav-btn active"><span class="material-symbols-outlined">home</span></button>
    <button class="nav-btn" onclick="clearAll()"><span class="material-symbols-outlined">delete_sweep</span></button>
    <button class="nav-btn" style="margin-top: auto;" onclick="toggleTheme()"><span class="material-symbols-outlined">palette</span></button>
  </nav>

  <main>
    <h2 style="width:100%; max-width:900px; font-weight:800; font-size:1.8rem">đang xem</h2>
    <div class="player-wrap"><iframe id="video-frame" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe></div>
    <form class="control-box" onsubmit="handlePlay(event)">
      <input type="text" id="v-url" placeholder="Dán link tại đây..." required />
      <button type="submit" class="btn-go">XẢ RÁC</button>
    </form>
  </main>

  <aside>
    <div style="font-weight:800; margin-bottom:20px; display:flex; justify-content:space-between"><span>DANH SÁCH</span></div>
    <div id="plist-content"></div>
  </aside>

  <script>
    // Instance ổn định hơn
    const PIPED = "https://pipedapi.kavin.rocks"; 

    function getID(url) {
      const reg = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
      return url.match(reg)?.[1] || (url.length === 11 ? url : null);
    }

    async function handlePlay(e) {
      if(e) e.preventDefault();
      const id = getID(document.getElementById('v-url').value);
      if (!id) return;
      
      document.getElementById('video-frame').src = `https://piped.video/embed/${id}?autoplay=1`;
      
      try {
        const res = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${id}`);
        const data = await res.json();
        saveToP(id, data.title || "Video " + id);
      } catch(e) {
        saveToP(id, "Video " + id);
      }
      document.getElementById('v-url').value = '';
    }

    function saveToP(id, title) {
      let list = JSON.parse(localStorage.getItem('sh-list') || '[]');
      // Lọc bỏ những mục "undefined" cũ
      list = list.filter(i => i.id && i.title && i.title !== "undefined");
      if (!list.find(i => i.id === id)) {
        list.unshift({id, title});
        localStorage.setItem('sh-list', JSON.stringify(list.slice(0, 10)));
        renderP();
      }
    }

    function renderP() {
      let list = JSON.parse(localStorage.getItem('sh-list') || '[]');
      // Chỉ hiện những mục hợp lệ
      list = list.filter(i => i.id && i.title && i.title !== "undefined");
      document.getElementById('plist-content').innerHTML = list.map(i => `
        <div class="plist-item" onclick="document.getElementById('video-frame').src='https://piped.video/embed/${i.id}?autoplay=1'">
          <img src="https://img.youtube.com/vi/${i.id}/mqdefault.jpg">
          <b>${i.title}</b>
        </div>
      `).join('');
    }

    function clearAll() {
      if(confirm("Xóa sạch danh sách?")) {
        localStorage.removeItem('sh-list');
        renderP();
      }
    }

    function toggleTheme() {
      const b = document.documentElement;
      b.setAttribute("data-theme", b.getAttribute("data-theme") === "dark" ? "light" : "dark");
    }

    window.onload = renderP;
  </script>
</body>
</html> 
<head>

  <script>
    /* TỰ ĐỘNG CHUYỂN SANG LEGACY NẾU MÁY CŨ (iOS <= 12) */
    (function() {
      var ua = navigator.userAgent;
      var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
      if (isIOS) {
        var match = ua.match(/OS (\d+)_/);
        if (match && parseInt(match[1], 10) <= 12) window.location.href = "legacy.html";
      }
    })();
  </script>

  <style>

      --bg: #1c1c1e; --side: #121212; --card: #2c2c2e;
      --text: #ffffff; --primary: #f4b400; --border: #3a3a3c;

    [data-theme="light"] {
      --bg: #f2f2f7; --side: #ffffff; --card: #ffffff;

      margin: 0; font-family: 'Noto Sans', sans-serif;

      display: grid; grid-template-columns: 80px 1fr 320px; height: 100vh;
    }

    /* SIDEBAR */

    /* PLAYER */
    main { padding: 30px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }

    .plist-item:hover { border-color: var(--primary); }

  </style>
</head>
<body>
  <nav>
    <div class="brand-vibe" onclick="location.reload()">S T</div>
    <button class="nav-btn active"><span class="material-symbols-outlined">home</span></button>
    <button class="nav-btn" onclick="toggleLang()"><span class="material-symbols-outlined">language</span><div id="l-label" style="font-size:10px">EN</div></button>
    <button class="nav-btn" style="margin-top: auto;" onclick="toggleTheme()"><span class="material-symbols-outlined">palette</span></button>
  </nav>

  <main>
    <h2 id="t-watch" style="width:100%; max-width:900px; font-weight:800; font-size:2rem">watch</h2>
    <div class="player-wrap">
      <iframe id="video-frame" src="" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
    </div>
    <form class="control-box" onsubmit="handlePlay(event)">
      <input type="text" id="v-url" placeholder="Paste link or Video ID..." required />
      <button type="submit" class="btn-go" id="b-go">GO</button>
    </form>
  </main>

  <aside>
    <div style="font-weight:800; margin-bottom:20px" id="t-list">PLAYLIST</div>
    <div id="plist-content"></div>
  </aside>

  <script>
    const PIPED = "https://piped.video"; // Máy chủ Piped
    let lang = localStorage.getItem('sh-lang') || 'en';

    const i18n = {
      en: { watch: "watch", go: "GO", list: "PLAYLIST", ph: "Paste link here..." },
      vi: { watch: "đang xem", go: "XẢ RÁC", list: "DANH SÁCH", ph: "Dán link tại đây..." }
    };

    function updateLang() {
      document.getElementById('t-watch').innerText = i18n[lang].watch;
      document.getElementById('b-go').innerText = i18n[lang].go;
      document.getElementById('t-list').innerText = i18n[lang].list;
      document.getElementById('v-url').placeholder = i18n[lang].ph;
      document.getElementById('l-label').innerText = lang.toUpperCase();
    }

    function toggleLang() { lang = lang === 'en' ? 'vi' : 'en'; localStorage.setItem('sh-lang', lang); updateLang(); }

    function getID(url) {
      const reg = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
      return url.match(reg)?.[1] || (url.length === 11 ? url : null);
    }

    async function handlePlay(e) {
      e.preventDefault();
      const id = getID(document.getElementById('v-url').value);
      if (!id) return alert("Error Link!");
      
      document.getElementById('video-frame').src = `${PIPED}/embed/${id}?autoplay=1`;
      
      // Lấy tên video thật
      const res = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${id}`);
      const data = await res.json();
      saveToP(id, data.title || id);
      document.getElementById('v-url').value = '';
    }

    function saveToP(id, title) {
      let list = JSON.parse(localStorage.getItem('sh-list') || '[]');
      if (!list.find(i => i.id === id)) {
        list.unshift({id, title});
        localStorage.setItem('sh-list', JSON.stringify(list.slice(0, 10)));
        renderP();
      }
    }

    function renderP() {
      const list = JSON.parse(localStorage.getItem('sh-list') || '[]');
      document.getElementById('plist-content').innerHTML = list.map(i => `
        <div class="plist-item" onclick="document.getElementById('video-frame').src='${PIPED}/embed/${i.id}?autoplay=1'">
          <img src="https://img.youtube.com/vi/${i.id}/mqdefault.jpg">
          <b style="font-size:0.8rem">${i.title}</b>
        </div>
      `).join('');
    }

    function toggleTheme() {
      const b = document.documentElement;
      b.setAttribute("data-theme", b.getAttribute("data-theme") === "dark" ? "light" : "dark");
    }

    window.onload = () => { updateLang(); renderP(); };
  </script>
</body>
</html>
