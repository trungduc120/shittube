<!doctype html>
<html lang="vi" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>shittube legacy – sạch & gọn</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;800&display=swap" rel="stylesheet" />
  
  <style>
    :root {
      --bg: #121212; --text: #ffffff; --primary: #f4b400; --input: #1e1e1e;
    }
    [data-theme="light"] {
      --bg: #f8f9fa; --text: #1a1a1a; --primary: #e67e22; --input: #ffffff;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: 'Noto Sans', sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh; padding: 40px 20px; transition: 0.3s;
    }

    /* --- GÓC NGÔN NGỮ --- */
    .top-nav {
      position: absolute; top: 20px; right: 30px;
      display: flex; gap: 15px; font-weight: 800; font-size: 0.9rem;
    }
    .lang-btn { cursor: pointer; opacity: 0.4; transition: 0.2s; }
    .lang-btn.active, .lang-btn:hover { opacity: 1; color: var(--primary); }

    /* --- NỘI DUNG CHÍNH (Căn giữa) --- */
    .container {
      width: 100%; max-width: 1000px;
      display: flex; flex-direction: column; align-items: center;
    }

    h1 {
      font-size: clamp(2.5rem, 10vw, 4rem); font-weight: 800;
      margin: 0 0 30px 0; letter-spacing: -3px; color: var(--primary);
    }

    .search-row {
      display: flex; width: 100%; max-width: 700px; gap: 10px; margin-bottom: 40px;
    }

    input {
      flex: 1; padding: 18px 25px; border-radius: 50px;
      border: 2px solid #333; background: var(--input);
      color: inherit; font-size: 1.1rem; outline: none; transition: 0.2s;
    }
    input:focus { border-color: var(--primary); }

    .btn-go {
      padding: 0 40px; border-radius: 50px; border: none;
      background: var(--primary); color: #000;
      font-weight: 900; font-size: 1rem; cursor: pointer;
    }

    /* --- KHUNG VIDEO DÀI & TO --- */
    .video-box {
      width: 100%; aspect-ratio: 16 / 9;
      background: #000; border-radius: 24px; overflow: hidden;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
      border: 1px solid #333; display: none;
    }
    iframe { width: 100%; height: 100%; border: none; }

    footer { margin-top: auto; padding-top: 40px; opacity: 0.5; font-size: 0.8rem; text-align: center; }
    a { color: inherit; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>

  <div class="top-nav">
    <span class="lang-btn active">EN</span>
    <span class="lang-btn">VN</span>
    <span class="lang-btn" onclick="toggleTheme()">DARK</span>
  </div>

  <div class="container">
    <h1>shittube legacy</h1>

    <form class="search-row" onsubmit="play(event)">
      <input type="text" id="url" placeholder="Paste link or Video ID..." required />
      <button type="submit" class="btn-go">GO</button>
    </form>

    <div class="video-box" id="v-box">
      <iframe id="player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
  </div>

  <footer>
    <p>Sử dụng nguồn từ YouTube [cite: 63]</p>
    <a href="shittubev4.html">← Quay lại bản Modern Pro</a>
  </footer>

  <script>
    function toggleTheme() {
      const b = document.documentElement;
      b.setAttribute("data-theme", b.getAttribute("data-theme") === "dark" ? "light" : "dark");
    }

    function play(e) {
      e.preventDefault();
      const val = document.getElementById('url').value;
      const reg = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
      const id = val.match(reg)?.[1] || (val.length === 11 ? val : null);

      if (id) {
        document.getElementById('player').src = `https://www.youtube.com/embed/${id}?autoplay=1&modestbranding=1`;
        document.getElementById('v-box').style.display = 'block';
        window.scrollTo({ top: document.getElementById('v-box').offsetTop - 20, behavior: 'smooth' });
      } else {
        alert("Link error!");
      }
    }
  </script>
</body>
</html>
