<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>shittube legacy - fix black screen</title>
    <style>
        body { background: #000; color: #fff; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 15px; }
        h1 { color: #f4b400; font-size: 22px; }
        .input-box { margin-bottom: 15px; }
        input { width: 60%; padding: 10px; border: 1px solid #444; background: #222; color: #fff; font-size: 16px; border-radius: 4px; }
        button { padding: 10px 15px; background: #f4b400; border: none; font-weight: bold; border-radius: 4px; }
        
        /* Khung video cố định chiều cao cho máy cũ */
        #v-box { width: 100%; max-width: 600px; margin: 20px auto; display: none; border: 2px solid #333; }
        iframe { width: 100%; height: 300px; border: none; background: #111; }
        
        .fix-btns { margin-top: 15px; background: #1a1a1a; padding: 10px; border-radius: 8px; border: 1px dashed #f4b400; }
        .fix-btns p { font-size: 13px; margin: 0 0 10px 0; color: #aaa; }
        .sv-btn { display: inline-block; padding: 8px 12px; margin: 5px; background: #333; color: #f4b400; font-size: 12px; font-weight: bold; text-decoration: none; border-radius: 4px; border: 1px solid #444; }
    </style>
</head>
<body>

    <h1>shittube legacy</h1>

    <div class="input-box">
        <input type="text" id="v-link" placeholder="Dán link hoặc mã video...">
        <button onclick="play()">GO</button>
    </div>

    <div id="v-box">
        <iframe id="player" src="" allowfullscreen></iframe>
    </div>

    <div class="fix-btns">
        <p>Bị đen màn hình? Nhấn thử các nút dưới đây:</p>
        <div class="sv-btn" onclick="changeSV('https://www.youtube-nocookie.com/embed/')">SỐ 1 (GỐC)</div>
        <div class="sv-btn" onclick="changeSV('https://vid.puffyan.us/embed/')">SỐ 2 (NHẸ)</div>
        <div class="sv-btn" onclick="changeSV('https://piped.video/embed/')">SỐ 3 (PIPED)</div>
    </div>

    <div style="margin-top:40px;"><a href="index.html" style="color:#666; font-size:12px;">Về bản Modern Pro</a></div>

    <script>
        var currentId = "";

        function play() {
            var val = document.getElementById('v-link').value;
            var id = "";
            // Tách ID video
            if (val.indexOf('v=') !== -1) { id = val.split('v=')[1].split('&')[0]; }
            else if (val.indexOf('youtu.be/') !== -1) { id = val.split('youtu.be/')[1].split('?')[0]; }
            else { id = val; }

            if (id.length >= 11) {
                currentId = id.substring(0, 11);
                changeSV('https://www.youtube-nocookie.com/embed/'); // Mặc định dùng YT gốc cho chắc
            } else {
                alert("ID không đúng!");
            }
        }

        function changeSV(base) {
            if (!currentId) { alert("Dán link rồi nhấn GO đã!"); return; }
            document.getElementById('v-box').style.display = "block";
            // Nạp video với mã ID
            document.getElementById('player').src = base + currentId + "?autoplay=1";
        }
    </script>
</body>
</html>
