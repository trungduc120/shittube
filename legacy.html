<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>shittube legacy - ultra fix</title>
  <style>
    /* Dùng bảng màu đơn giản, không dùng biến root */
    body { background: #121212; color: #ffffff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
    h1 { color: #f4b400; font-size: 24px; margin-bottom: 20px; }
    
    /* Ô nhập liệu kiểu cũ, không dùng Flexbox phức tạp */
    .search-box { margin-bottom: 20px; width: 100%; }
    input { width: 70%; padding: 12px; border-radius: 5px; border: 1px solid #333; background: #1e1e1e; color: #fff; }
    button { padding: 12px 20px; border-radius: 5px; border: none; background: #f4b400; font-weight: bold; cursor: pointer; }

    /* Khung video dùng tỷ lệ chiều cao cố định để không bị nát trên iOS cũ */
    .video-container { width: 100%; max-width: 800px; margin: 0 auto; background: #000; position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border: 1px solid #333; display: none; }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    
    .footer-link { margin-top: 30px; display: block; color: #888; text-decoration: none; font-size: 14px; }
  </style>
</head>
<body>

  <h1>shittube legacy</h1>

  <div class="search-box">
    <input type="text" id="link" placeholder="Dán mã video hoặc link...">
    <button onclick="play()">GO</button>
  </div>

  <div id="v-box" class="video-container">
    <iframe id="player" src="" allowfullscreen></iframe>
  </div>

  <a href="index.html" class="footer-link">Về bản Modern Pro</a>

  <script>
    function play() {
      var val = document.getElementById('link').value;
      var id = "";
      
      // Trích xuất ID đơn giản
      if(val.indexOf('v=') !== -1) {
        id = val.split('v=')[1].split('&')[0];
      } else if(val.indexOf('youtu.be/') !== -1) {
        id = val.split('youtu.be/')[1];
      } else {
        id = val;
      }

      if(id.length >= 11) {
        // Dùng Piped hoặc Invidious tùy chọn, ở đây mình dùng piped
        document.getElementById('player').src = "https://piped.video/embed/" + id.substring(0,11) + "?autoplay=1";
        document.getElementById('v-box').style.display = "block";
      } else {
        alert("ID không đúng!");
      }
    }
  </script>
</body>
</html>
