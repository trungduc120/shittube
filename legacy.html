<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>shittube legacy - ultra fix</title>
    <style>
        /* CSS cực kỳ cơ bản, không dùng Grid hay Variable */
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: Arial, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }
        h1 { color: #f4b400; font-size: 24px; }
        .box { margin-bottom: 20px; }
        input { 
            width: 60%; 
            padding: 10px; 
            border: 1px solid #444; 
            background: #222; 
            color: #fff; 
            font-size: 16px; 
        }
        button { 
            padding: 10px 20px; 
            background: #f4b400; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
        }
        /* Khung video kiểu cũ để không bị nát */
        .video-container { 
            width: 100%; 
            max-width: 600px; 
            margin: 20px auto; 
            border: 1px solid #333; 
            display: none; 
        }
        .footer { margin-top: 50px; font-size: 12px; }
        a { color: #888; text-decoration: none; }
    </style>
</head>
<body>

    <h1>shittube legacy</h1>

    <div class="box">
        <input type="text" id="v-link" placeholder="Dán link hoặc mã video...">
        <button onclick="playVideo()">GO</button>
    </div>

    <div id="v-box" class="video-container">
        <iframe id="player" width="100%" height="315" src="" frameborder="0" allowfullscreen></iframe>
    </div>

    <div class="footer">
        <a href="index.html">Về bản Modern Pro</a>
    </div>

    <script>
        // Dùng 'var' thay vì 'let/const' để iOS 12 không bị crash
        function playVideo() {
            var val = document.getElementById('v-link').value;
            var id = "";

            // Cách tách ID thủ công cho trình duyệt cũ
            if (val.indexOf('v=') !== -1) {
                id = val.split('v=')[1].split('&')[0];
            } else if (val.indexOf('youtu.be/') !== -1) {
                id = val.split('youtu.be/')[1].split('?')[0];
            } else {
                id = val;
            }

            if (id.length >= 11) {
                // Dùng Invidious (yewtu.be) vì nó nhẹ nhất cho iPad mini 2
                var embedUrl = "https://yewtu.be/embed/" + id.substring(0, 11) + "?autoplay=1";
                document.getElementById('player').src = embedUrl;
                document.getElementById('v-box').style.display = "block";
            } else {
                alert("ID không đúng rồi đại ca!");
            }
        }
    </script>
</body>
</html>
